<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus App Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --void: #05081A;
            --nexus-indigo: #1A237E;
            --electric-green: #00E676;
            --text-primary: #FFFFFF;
            --text-muted: #8C9EFF;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: transparent;
            color: var(--text-primary);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
        }

        .phone-frame {
            width: 380px;
            height: 800px;
            background: var(--void);
            border: 12px solid #1c1c1e;
            border-radius: 50px;
            position: relative;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8), 0 0 20px rgba(26, 35, 126, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .notch {
            width: 160px;
            height: 30px;
            background: #1c1c1e;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 10;
        }

        .status-bar {
            height: 44px;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: 600;
        }

        .app-content {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .profile-pic {
            width: 40px;
            height: 40px;
            background: var(--nexus-indigo);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            border: 1px solid var(--glass-border);
        }

        .welcome-text h2 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        .welcome-text p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            transition: transform 0.3s ease;
        }

        .card:active {
            transform: scale(0.98);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-card {
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 800;
            color: var(--electric-green);
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .action-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .action-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 16px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .action-item:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--nexus-indigo);
        }

        .action-icon {
            width: 32px;
            height: 32px;
            background: var(--nexus-indigo);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .action-info h4 {
            font-size: 14px;
            font-weight: 600;
        }

        .action-info p {
            font-size: 11px;
            color: var(--text-muted);
        }

        .offline-badge {
            position: absolute;
            top: 24px;
            right: 24px;
            background: var(--electric-green);
            color: var(--void);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .compute-button {
            margin-top: auto;
            background: var(--nexus-indigo);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(26, 35, 126, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .glow-effect {
            position: absolute;
            width: 200px;
            height: 200px;
            background: var(--nexus-indigo);
            filter: blur(80px);
            opacity: 0.2;
            pointer-events: none;
        }

        .progress-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 8, 26, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--glass);
            border-top: 4px solid var(--electric-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success-checkmark {
            color: var(--electric-green);
            font-size: 60px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="glow-effect" style="top: -50px; right: -50px;"></div>
    <div class="glow-effect" style="bottom: -50px; left: -50px;"></div>

    <div class="phone-frame">
        <div class="notch"></div>
        <div class="status-bar">
            <span>9:41</span>
            <div style="display: flex; gap: 5px;">
                <span>📶</span>
                <span>🔋</span>
            </div>
        </div>

        <div class="app-content">
            <span class="offline-badge">OFFLINE SECURE</span>
            
            <div class="header">
                <div class="welcome-text">
                    <p>Good Morning,</p>
                    <h2>Principal Okoro</h2>
                </div>
                <div class="profile-pic">P</div>
            </div>

            <div class="card stats-grid">
                <div class="stat-card">
                    <p class="stat-value">JS 1-3</p>
                    <p class="stat-label">Current Task</p>
                </div>
                <div class="stat-card">
                    <p class="stat-value">521</p>
                    <p class="stat-label">Students</p>
                </div>
            </div>

            <div class="action-list">
                <div class="action-item">
                    <div class="action-icon">📝</div>
                    <div class="action-info">
                        <h4>Mathematics CI</h4>
                        <p>JS3 Alpha • 42/42 Sync'd</p>
                    </div>
                </div>
                <div class="action-item" style="border-color: var(--electric-green); background: rgba(0, 230, 118, 0.05);">
                    <div class="action-icon" style="background: var(--electric-green); color: var(--void);">✓</div>
                    <div class="action-info">
                        <h4>English Language</h4>
                        <p>SS2 Beta • Verified by Biometric</p>
                    </div>
                </div>
                <div class="action-item">
                    <div class="action-icon">📊</div>
                    <div class="action-info">
                        <h4>Biology Mid-Term</h4>
                        <p>Pending Upload • Local Encrypted</p>
                    </div>
                </div>
            </div>

            <button class="compute-button" onclick="startCompute()">
                <span>Generate All Reports</span>
                <span style="font-size: 12px; font-weight: 400; opacity: 0.8;">(4s)</span>
            </button>
        </div>

        <div id="progressOverlay" class="progress-overlay">
            <div id="spinner" class="spinner"></div>
            <div id="success" style="display: none; text-align: center;">
                <div class="success-checkmark">✓</div>
                <h3 style="font-weight: 800; font-size: 24px; margin-bottom: 10px;">Done.</h3>
                <p style="color: var(--text-muted);">521 PDF Reports Ready</p>
            </div>
        </div>
    </div>

    <script>
        function setScale() {
            const frame = document.querySelector('.phone-frame');
            const targetWidth = 380;
            const targetHeight = 800;
            const padding = 20; // safe area
            const scaleX = (window.innerWidth - padding) / targetWidth;
            const scaleY = (window.innerHeight - padding) / targetHeight;
            const scale = Math.min(scaleX, scaleY, 1);
            frame.style.transform = `scale(${scale})`;
            frame.style.transformOrigin = 'center center';
        }

        window.addEventListener('resize', setScale);
        setScale();

        function startCompute() {
            const overlay = document.getElementById('progressOverlay');
            const spinner = document.getElementById('spinner');
            const success = document.getElementById('success');
            
            overlay.style.display = 'flex';
            spinner.style.display = 'block';
            success.style.display = 'none';

            setTimeout(() => {
                spinner.style.display = 'none';
                success.style.display = 'block';
                
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 2000);
            }, 4000);
        }
    </script>
</body>
</html>
